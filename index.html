<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>静静老师，生日快乐</title>
  <link rel="stylesheet" href="styles.css?v=20260524b" />
</head>

<body>
  <canvas id="sky" aria-hidden="true"></canvas>

  <main class="shell">
    <section class="hero" aria-label="生日祝福">
      <div class="hero-copy">
        <p class="kicker">A small universe built just for you</p>
        <h1>静静老师</h1>
        <h1>生日快乐</h1>
        <p class="lead">
          愿你新的一岁顺顺利利，也顺便多喜欢我一点哦。
        </p>
      </div>

      <div class="orbital-stage" aria-label="互动生日卡片">
        <div class="halo"></div>
        <div class="planet">
          <div class="cake">
            <button class="flame" id="wishButton" type="button" aria-label="点亮许愿"></button>
            <span class="candle"></span>
            <span class="cake-top"></span>
            <span class="cake-body"></span>
            <span class="cake-shadow"></span>
          </div>
        </div>
        <p class="stage-note" id="hintText">点一下烛光，开启有惊喜哦</p>
      </div>
    </section>

  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- 生日寄语弹窗 -->
  <div class="modal-backdrop" id="wishModal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-card">
      <button class="modal-close-btn" id="modalCloseBtn" type="button" aria-label="关闭弹窗">&times;</button>
      <div class="modal-content">
        <div class="modal-image-col">
          <img src="Gemini_Generated_Image_zcqngtzcqngtzcqn.png" alt="生日卡片插图" class="modal-img" />
        </div>
        <div class="modal-text-col">
          <div class="modal-body">
            <span class="modal-kicker">Birthday Blessing</span>
            <h3 class="modal-title">给静静老师</h3>
            <div class="modal-blessing-lines">
              <p>愿星河在你的眼眸里闪烁，</p>
              <p>愿每一缕晚风都带去温暖的问候。</p>
              <p>新的一岁，愿你活成自己热爱的模样，</p>
              <p class="modal-highlight">所有美好与偏爱，都如期而至。</p>
            </div>
          </div>

          <!-- 移入弹窗的许愿表单 -->
          <form id="wishForm" class="modal-wish-form" action="https://api.web3forms.com/submit" method="POST">
            <!-- TODO: 请在此处填写你从 Web3Forms 获取的 Access Key -->
            <input type="hidden" name="access_key" value="8ac134e4-3b04-4bcd-8d71-32aa2b07e4f5" />
            <input type="hidden" name="subject" value="她在生日页面写下了一个愿望" />
            <input type="checkbox" name="botcheck" class="honeypot" style="display: none;" />

            <div class="modal-form-group">
              <textarea id="wishText" name="愿望内容" maxlength="280" required placeholder="在此写下你的生日愿望..."></textarea>
            </div>

            <button class="modal-action-btn" id="sendButton" type="submit">
              发送愿望并吹灭烛火
            </button>
            <p class="modal-form-note" id="formNote"></p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js?v=20260524b"></script>
</body>

</html>
